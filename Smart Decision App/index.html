<!DOCTYPE html>
<html>
<head>
  <title>Smart Decision App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>🚀 Smart Decision App</h1>
  <p>Day 2 JavaScript Project (Conditionals)</p>

  <!-- NUMBER CHECK -->
  <h3>1. Check Number</h3>
  <input id="num" placeholder="Enter number">
  <button onclick="checkNumber()">Check</button>
  <p id="numResult"></p>

  <!-- VOTING -->
  <h3>2. Voting Eligibility</h3>
  <input id="age" placeholder="Enter age">
  <button onclick="checkVoting()">Check</button>
  <p id="voteResult"></p>

  <!-- LARGEST -->
  <h3>3. Largest Number</h3>
  <input id="a" placeholder="Number 1">
  <input id="b" placeholder="Number 2">
  <button onclick="largest()">Find</button>
  <p id="largestResult"></p>

  <!-- GRADE -->
  <h3>4. Grade System</h3>
  <input id="marks" placeholder="Enter marks">
  <button onclick="grade()">Check</button>
  <p id="gradeResult"></p>

  <!-- LEAP YEAR -->
  <h3>5. Leap Year</h3>
  <input id="year" placeholder="Enter year">
  <button onclick="leapYear()">Check</button>
  <p id="yearResult"></p>

  <!-- GREETING -->
  <h3>6. Smart Greeting</h3>
  <button onclick="greet()">Get Greeting</button>
  <p id="greetResult"></p>

</div>

<script src="script.js"></script>
</body>
</html>

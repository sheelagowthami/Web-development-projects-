<!-- demo.html -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>HeritageLens Demo</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
<nav class="navbar sticky">
  <div class="logo">HeritageLens AI</div>
</nav>
<section class="demo-section">
  <div class="demo-header">
    <h2>Heritage Insights</h2>
    <button id="scanButton" class="btn-primary">SCAN IMAGE</button>
    <button id="listenBtn" class="btn-secondary">🔊 Listen</button>
    <button id="stopBtn" class="btn-secondary">Stop</button>
  </div>
  <div class="demo-content">
    <div id="recognizedInfo" class="info-box"></div>
    <div id="mapContainer" class="map-box"></div>
    <div id="aiResponse" class="response-box"></div>
  </div>
</section>

<!-- Hidden file input for Scan button -->
<input type="file" accept="image/*" id="imageInput" style="display:none" />

<script src="script.js"></script>
</body>
</html>

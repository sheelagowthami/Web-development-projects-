<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI Demo - HeritageLens</title>
<link rel="stylesheet" href="style.css"/>
</head>
<body>

<nav class="navbar">
  <div class="logo">🏛️ HeritageLens AI</div>
</nav>

<section class="section">

  <h1>Heritage AI Scanner</h1>

  <button class="btn primary" onclick="openScanner()">📷 Scan Monument</button>

  <input type="file" id="scanner" accept="image/*" hidden onchange="handleScan(event)"/>

  <div class="glass">
    <h2>AI Result</h2>
    <div id="aiOutput">Scan a monument to begin analysis...</div>
  </div>

  <div class="glass">
    <h2>🗺️ Map</h2>
    <iframe id="mapFrame" width="100%" height="300"></iframe>
  </div>

  <button class="btn secondary" onclick="speakText()">🔊 Listen</button>
  <button class="btn secondary" onclick="stopSpeech()">⏹ Stop</button>

</section>

<div id="modal" class="modal" onclick="closeModal()">
  <img id="modalImg"/>
</div>

<script src="script.js"></script>
</body>
</html>

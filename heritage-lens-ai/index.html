<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HeritageLens AI — Level 2</title>
  <link rel="stylesheet" href="style.css"/>
</head>

<body>

<div class="bg"></div>

<nav>
  <div class="logo">🏛️ HeritageLens AI</div>
  <div class="nav-links">
    <a href="#">Home</a>
    <a href="#demo">AI Demo</a>
  </div>
</nav>

<header class="hero">
  <h1>AI That Brings <span class="grad">History Alive</span></h1>
  <p>Chat • Scan • Listen • Explore Heritage with AI</p>
</header>

<!-- DEMO -->
<section id="demo">

  <div class="container">

    <!-- CHAT BOX -->
    <div class="chat-box">
      <div id="chat"></div>

      <div class="input-row">
        <input id="userInput" placeholder="Ask about Taj Mahal, forts, temples..." />
        <button onclick="sendMessage()">Send</button>
      </div>
    </div>

    <!-- SIDE PANEL -->
    <div class="side-panel">

      <!-- LENS MODE -->
      <div class="card">
        <h3>📷 Lens Scan Mode</h3>
        <input id="lensInput" placeholder="Enter monument name..." />
        <button onclick="lensScan()">Scan</button>
        <div id="scanStatus"></div>
      </div>

      <!-- VOICE -->
      <div class="card">
        <h3>🔊 Voice Narration</h3>
        <button onclick="speakLast()">Speak Last Response</button>
        <button onclick="stopSpeech()">Stop</button>
      </div>

    </div>

  </div>
</section>

<!-- IMAGE MODAL -->
<div id="modal" class="modal">
  <div class="modal-content">
    <span onclick="closeModal()" class="close">✖</span>
    <img id="modalImg"/>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>

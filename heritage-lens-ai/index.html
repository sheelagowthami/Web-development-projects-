<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HeritageLens AI — Level 3</title>
  <link rel="stylesheet" href="style.css"/>
</head>

<body>

<div class="bg"></div>

<nav>
  <div class="logo">🏛️ HeritageLens AI</div>
  <div class="nav-links">
    <a href="#">Home</a>
    <a href="#demo">AI Studio</a>
  </div>
</nav>

<header class="hero">
  <h1>HeritageLens <span class="grad">AI Engine</span></h1>
  <p>Real AI • Memory • Voice • Smart Tourism Intelligence</p>
</header>

<section id="demo" class="layout">

  <!-- CHAT -->
  <div class="panel">
    <h2>💬 AI Chat Engine</h2>

    <div id="chat"></div>

    <div class="input-row">
      <input id="input" placeholder="Ask about monuments..." />
      <button onclick="send()">Send</button>
    </div>

    <div class="small">
      Powered by AI Engine (API-ready fallback system)
    </div>
  </div>

  <!-- FEATURES -->
  <div class="panel">

    <h2>🧠 AI Controls</h2>

    <button onclick="startVoice()">🔊 Speak Last Answer</button>
    <button onclick="stopVoice()">⛔ Stop Voice</button>

    <hr/>

    <h3>📷 Lens AI Scan</h3>
    <input id="lens" placeholder="Enter monument name"/>
    <button onclick="lens()">Scan</button>

    <div id="scan"></div>

    <hr/>

    <h3>🗺️ Smart Map</h3>
    <div id="map"></div>

  </div>

</section>

<script src="script.js"></script>
</body>
</html>

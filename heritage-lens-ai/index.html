<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HeritageLens AI — Level 4</title>
  <link rel="stylesheet" href="style.css"/>
</head>

<body>

<div class="bg"></div>

<nav>
  <div class="logo">🏛️ HeritageLens AI Pro</div>
  <div>
    <button onclick="startCamera()">📸 Scan</button>
    <button onclick="loadHistory()">🧠 History</button>
  </div>
</nav>

<header class="hero">
  <h1>HeritageLens <span class="grad">AI Final Boss</span></h1>
  <p>Vision AI • Memory • Smart Tourism Engine</p>
</header>

<section class="app">

  <!-- CAMERA PANEL -->
  <div class="panel">
    <h2>📸 Live Scan</h2>

    <video id="video" autoplay></video>
    <canvas id="canvas" hidden></canvas>

    <button onclick="capture()">Capture & Identify</button>

    <div id="visionResult"></div>
  </div>

  <!-- AI CHAT -->
  <div class="panel">
    <h2>🤖 Heritage AI</h2>

    <div id="chat"></div>

    <input id="input" placeholder="Ask about monuments..." />
    <button onclick="ask()">Ask AI</button>
  </div>

</section>

<script src="ai.js"></script>
<script src="vision.js"></script>
<script src="app.js"></script>

</body>
</html>

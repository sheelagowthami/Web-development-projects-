<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>HeritageLens AI</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
<nav class="navbar">
  <div class="logo">HeritageLens AI</div>
  <ul class="nav-links">
    <li><a href="#home">Home</a></li>
    <li><a href="#categories">Categories</a></li>
    <li><a href="about.html">About</a></li>
    <li><a href="features.html">Features</a></li>
  </ul>
</nav>

<section class="hero" id="home">
  <h1 class="hero-title">Explore India’s Heritage with AI</h1>
  <div class="hero-buttons">
    <button class="btn-primary" id="demoBtn">Try AI Demo</button>
    <button class="btn-secondary" id="exploreBtn">Explore Heritage Lens</button>
  </div>
</section>

<section id="categories" class="categories-section">
  <h2 class="section-title">Indian Monuments</h2>
  <div class="cards-container" id="indian-monuments"></div>
</section>

<section id="foreign" class="categories-section">
  <h2 class="section-title">Foreign Monuments</h2>
  <div class="cards-container" id="foreign-monuments"></div>
</section>

<section id="wonders" class="categories-section">
  <h2 class="section-title">7 Wonders</h2>
  <div class="cards-container" id="wonders-list"></div>
</section>

<!-- Modal for image gallery -->
<div id="imageModal" class="modal">
  <span class="close" id="closeModal">&times;</span>
  <img class="modal-content" id="modalImage" />
  <div class="modal-caption" id="modalCaption"></div>
</div>

<script src="script.js"></script>
</body>
</html>

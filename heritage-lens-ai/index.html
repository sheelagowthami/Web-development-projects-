<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HeritageLens AI</title>
  <link rel="stylesheet" href="style.css"/>
</head>

<body>

<div class="bg-gradient"></div>

<!-- NAV -->
<nav>
  <div class="nav-brand">
    <span>🏛️ HeritageLens</span>
    <small class="ai-tag">AI</small>
  </div>

  <div class="nav-links" id="navLinks">
    <a href="index.html" class="active">Home</a>
    <a href="about.html">About</a>
    <a href="features.html">Features</a>
    <a href="demo.html" class="nav-cta">Try Demo</a>
  </div>

  <div class="nav-toggle" onclick="toggleMenu()">
    <span></span><span></span><span></span>
  </div>
</nav>

<!-- HERO (NEW AI SEARCH EXPERIENCE) -->
<section class="hero">

  <div class="hero-box glass">

    <h1>
      HeritageLens <span class="gradient-text">AI</span>
    </h1>

    <p class="subtitle">
      Ask anything about India’s monuments — get instant AI-powered heritage stories.
    </p>

    <!-- AI SEARCH BAR -->
    <div class="search-box">
      <input type="text" placeholder="Try: 'Tell me about Taj Mahal'" id="searchInput"/>
      <button onclick="askAI()">🔍</button>
    </div>

    <!-- QUICK SUGGESTIONS -->
    <div class="chips">
      <button onclick="quickAsk('Taj Mahal')">Taj Mahal</button>
      <button onclick="quickAsk('Red Fort')">Red Fort</button>
      <button onclick="quickAsk('Hampi')">Hampi</button>
      <button onclick="quickAsk('Konark Sun Temple')">Konark</button>
    </div>

  </div>

</section>

<!-- AI RESPONSE BOX -->
<section class="response-section">
  <div class="glass response-box" id="responseBox">
    <p class="muted">Your AI heritage story will appear here...</p>
  </div>
</section>

<!-- FOOTER -->
<footer>
  <p>HeritageLens AI — Smart Cultural Experience System</p>
</footer>

<script src="script.js"></script>
</body>
</html>
